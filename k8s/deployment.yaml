apiVersion: apps/v1
kind: Deployment

metadata:
  name: smart-water-rl-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: smart-water-rl

  template:
    metadata:
      labels:
        app: smart-water-rl

    spec:
      containers:
      - name: smart-water-rl-container
        image: smart-water-rl:latest

        ports:
        - containerPort: 8000

        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"

          requests:
            memory: "256Mi"
            cpu: "250m"